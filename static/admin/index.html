<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FRBK Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@latest/dist/decap-cms.css">
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
    <script>
      if (window.CMS) {
        const h = window.h || (window.CMS && window.CMS.h);

        window.CMS.registerPreviewStyle("https://unpkg.com/@picocss/pico@latest/css/pico.min.css");
        window.CMS.registerPreviewStyle("http://localhost:1313/css/custom.css");

        function buildMasthead(props) {
          if (!h) {
            return document.createElement("div");
          }
          const entry = props && (props.entry || props);
          const widgetFor = props && props.widgetFor ? props.widgetFor : function () { return null; };
          const hasGetIn = entry && typeof entry.getIn === "function";
          const hasGet = entry && typeof entry.get === "function";
          const data = hasGetIn
            ? entry.getIn(["data"])
            : hasGet
            ? entry.get("data")
            : (entry && entry.data) || {};
          const getValue = (key) => {
            if (data && typeof data.get === "function") return data.get(key);
            return data ? data[key] : undefined;
          };
          const heroImage = getValue("heroImage") || "/img/hero-fotballbane.jpg";
          const heroPosition = getValue("heroPosition") || "center";
          const title = getValue("title") || "";
          const summary = getValue("summary") || "";

          return h(
            "div",
            { className: "preview-shell" },
            h(
              "section",
              {
                className: "masthead masthead--hero",
                style: {
                  "--masthead-image": `url('${heroImage}')`,
                  "--masthead-position": heroPosition,
                },
              },
              h(
                "div",
                { className: "container masthead__content" },
                h(
                  "section",
                  { className: "hero-card hero-card--overlay" },
                  h(
                    "div",
                    { className: "hero-card__grid hero-card__grid--single" },
                    h(
                      "div",
                      { className: "hero-card__text" },
                      h("h1", {}, title),
                      summary ? h("p", { className: "lead" }, summary) : null
                    )
                  )
                )
              )
            ),
            h("main", { className: "container" }, widgetFor("body"))
          );
        }

        window.CMS.registerPreviewTemplate("home", buildMasthead);
        window.CMS.registerPreviewTemplate("pages", buildMasthead);
        window.CMS.registerPreviewTemplate("news", buildMasthead);
      }
    </script>
  </body>
</html>
