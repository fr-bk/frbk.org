{{ define "main" }}
<article>
  <header>
    <h1>{{ .Title }}</h1>
    <small>{{ .Date.Format "02.01.2006" }}</small>
  </header>

  {{ with .Params.summary }}
    <p><em>{{ . }}</em></p>
  {{ end }}

  {{ .Content }}

  <hr>
  <p><a href="/nyheter/">← Tilbake til nyheter</a></p>
</article>
{{ end }}
